<!DOCTYPE html>
<html lang="tr">
<head>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
</head>
<body>
    <div class="card">
        <h1>Sertifika Üretim Paneli (Admin)</h1>
        <input type="file" id="bgUpload" accept="image/*"> <input id="name" placeholder="Katılımcı Adı">
        <input id="event" placeholder="Etkinlik Adı">
        <input id="date" type="date">
        <button onclick="generate()">Sertifikayı Oluştur</button>
        <br>
        <canvas id="canvas" width="1600" height="900" style="display:none;"></canvas>
        <div id="result">
            <img id="finalImage" style="max-width:100%; border:1px solid #00ff00;">
            <br>
            <button onclick="download()">Görseli İndir (PNG)</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
