<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>METU NCC Cyber | Master Production Station</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; background-image: radial-gradient(#1f2937 0.8px, transparent 0.8px); background-size: 30px 30px; }
        .cyber-card { background: #161b22; border: 1px solid #30363d; border-radius: 12px; }
        .cyber-input { background: #0d1117; border: 1px solid #30363d; color: white; border-radius: 4px; font-size: 12px; }
    </style>
</head>
<body class="p-4 md:p-10 flex flex-col items-center">

    <div class="w-full max-w-7xl cyber-card p-8 flex flex-col lg:flex-row gap-8">
        <div class="lg:w-1/3 space-y-6">
            <div class="border-b border-gray-800 pb-4">
                <h1 class="text-[#10b981] font-black text-sm tracking-widest uppercase">Master Station v4.0</h1>
                <p class="text-[10px] opacity-50 font-mono mt-1">OPERATOR: <span class="text-white">ADMIN DEMO</span></p>
            </div>

            <div class="space-y-4">
                <label class="text-[10px] font-bold text-gray-500 uppercase">1. Şablon Seç (PNG)</label>
                <input type="file" id="bgInput" class="w-full text-xs text-gray-500 file:bg-emerald-600 file:text-white file:border-0 file:px-4 file:py-2 file:rounded">
                
                <label class="text-[10px] font-bold text-gray-500 uppercase block">2. İsimler (Satır Satır Gir veya CSV Yükle)</label>
                <textarea id="nameList" rows="5" class="cyber-input w-full p-2" placeholder="Ahmet Yılmaz&#10;Mehmet Kaya&#10;Ayşe Demir"></textarea>
                <input type="text" id="eventTitle" placeholder="ETKİNLİK ADI" class="cyber-input w-full p-2 mt-2">
            </div>

            <div class="space-y-4 pt-4 border-t border-gray-800">
                <label class="text-[10px] font-bold text-gray-500 uppercase">3. Mühürleme & Yerleşim</label>
                <div class="grid grid-cols-2 gap-2">
                    <button onclick="addElements()" class="bg-gray-800 text-[10px] py-2 rounded font-bold hover:bg-gray-700 transition">ELEMANLARI DİZ</button>
                    <button onclick="clearCanvas()" class="bg-red-900/30 text-red-500 border border-red-900/50 text-[10px] py-2 rounded font-bold">TEMİZLE</button>
                </div>
                <div class="flex gap-2">
                    <input type="text" id="prefix" value="MNCS" class="cyber-input w-1/3 text-center" placeholder="Prefix">
                    <button onclick="bulkGenerate()" class="bg-emerald-600 text-black font-black py-2 px-4 rounded text-[10px] w-full tracking-widest uppercase">TÜMÜNÜ BAS VE İNDİR</button>
                </div>
            </div>
        </div>

        <div class="lg:w-2/3 flex flex-col items-center">
            <h3 class="text-xs font-bold text-gray-500 mb-4 uppercase tracking-[0.3em]">Canlı Seri Üretim Önizleme</h3>
            <div id="canvas-container" class="relative shadow-2xl rounded-lg overflow-hidden border border-gray-800">
                <canvas id="fCanvas"></canvas>
            </div>
            <p class="mt-4 text-[10px] font-mono opacity-30 uppercase tracking-widest">Tasarımı düzenlemek için nesneleri sürükleyin. Toplu basım önizlemedeki tasarıma göre yapılır.</p>
        </div>
    </div>

    <script>
        const canvas = new fabric.Canvas('fCanvas', { width: 1600, height: 900, backgroundColor: '#161b22' });
        
        // 1. Arkaplan Yükleme
        document.getElementById('bgInput').onchange = (e) => {
            const reader = new FileReader();
            reader.onload = (f) => {
                fabric.Image.fromURL(f.target.result, (img) => {
                    canvas.setBackgroundImage(img, canvas.renderAll.bind(canvas), { scaleX: 1600/img.width, scaleY: 900/img.height });
                });
            };
            reader.readAsDataURL(e.target.files[0]);
        };

        // 2. Akıllı Eleman Dizilimi (Üst üste binmeyi önler)
        function addElements() {
            canvas.clear();
            // İsim Katmanı (Merkez Üst)
            const name = new fabric.IText('KATILIMCI ADI', { left: 800, top: 430, fontSize: 80, fontFamily: 'Inter', fontWeight: '800', fill: '#fff', originX: 'center', name: 'pName' });
            // Etkinlik Katmanı (Merkez Alt)
            const event = new fabric.IText(document.getElementById('eventTitle').value || 'ETKİNLİK ADI', { left: 800, top: 540, fontSize: 40, fontFamily: 'Inter', fill: '#10b981', originX: 'center', name: 'pEvent' });
            // QR ve ID Grubu (Sağ Alt)
            const certID = document.getElementById('prefix').value + "-00000";
            const idText = new fabric.IText("ID: " + certID, { left: 1560, top: 880, fontSize: 14, fill: '#ffffff', opacity: 0.3, fontFamily: 'JetBrains Mono', originX: 'right', name: 'pID' });
            
            canvas.add(name, event, idText);
            alert("Tasarım Dizildi. Yerleri mouse ile değiştirebilirsin.");
        }

        // 3. Seri Üretim Motoru (Toplu Basım)
        async function bulkGenerate() {
            const names = document.getElementById('nameList').value.split('\n').filter(n => n.trim() !== "");
            if(names.length === 0) return alert("Hata: İsim listesi boş!");
            
            const prefix = document.getElementById('prefix').value;
            const nameObj = canvas.getObjects().find(o => o.name === 'pName');
            const idObj = canvas.getObjects().find(o => o.name === 'pID');

            for (let i = 0; i < names.size(); i++) {
                const currentName = names[i].trim();
                const currentID = prefix + "-" + (10000 + i);
                
                // Canvası Güncelle
                if(nameObj) nameObj.set('text', currentName.toUpperCase());
                if(idObj) idObj.set('text', "ID: " + currentID);
                
                canvas.renderAll();

                // Dosyayı İndir
                const link = document.createElement('a');
                link.download = `MNCS_Cert_${currentName.replace(/\s/g, '_')}.png`;
                link.href = canvas.toDataURL({ format: 'png', quality: 1 });
                link.click();
                
                // Tarayıcıyı kasmamak için kısa bir bekleme
                await new Promise(r => setTimeout(r, 200));
            }
            alert(names.length + " adet sertifika başarıyla üretildi ve indirildi.");
        }

        function clearCanvas() { canvas.clear(); canvas.setBackgroundImage(null, canvas.renderAll.bind(canvas)); }

        // Canvas Zoom (Ekran Boyutuna Göre)
        function resize() {
            const container = document.getElementById('canvas-container');
            const scale = container.clientWidth / 1600;
            canvas.setZoom(scale); canvas.setWidth(1600 * scale); canvas.setHeight(900 * scale);
        }
        window.addEventListener('resize', resize); setTimeout(resize, 500);
    </script>
</body>
</html>
