<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>METU Cyber | Komuta Merkezi</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
</head>
<body>
    <div class="dashboard-card">
        <div class="cyber-header">
            <div>
                <h1 style="margin:0; font-size: 20px; letter-spacing: 2px;">SERTİFİKA KOMUTA MERKEZİ</h1>
                <p style="margin:5px 0 0; color: #8b949e; font-size: 12px;">Sistem Saati: 31.03.2026 15:54</p>
            </div>
            <div class="status-badge underline">Live System</div>
        </div>

        <div class="input-group">
            <input type="text" id="name" placeholder="KATILIMCI ADI">
            <input type="text" id="event" placeholder="ETKİNLİK ADI">
            <input type="text" id="date" placeholder="TARİH (Örn: 31 Mart 2026)">
            <input type="text" id="signer" placeholder="İMZALAYAN">
        </div>
        
        <label style="font-size: 12px; color: #8b949e; display:block; margin-bottom: 10px;">SERTİFİKA ŞABLONU (PNG YÜKLE)</label>
        <input type="file" id="bgLoad" accept="image/*" style="margin-bottom: 20px;">

        <button class="btn-primary" onclick="generate()">Sertifikayı Mühürle</button>

        <div id="previewArea">
            <canvas id="certCanvas" width="1600" height="900"></canvas>
            <div style="margin-top: 20px; display: flex; gap: 10px;">
                <button onclick="download()" class="btn-primary" style="background:#1f6feb;">PNG OLARAK İNDİR</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
