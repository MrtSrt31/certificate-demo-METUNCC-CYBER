<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>METU NCC Cybersecurity Society | Admin</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
</head>
<body>
    <div id="loginOverlay" class="dashboard-container mt-20 text-center">
        <div class="event-card max-w-md mx-auto">
            <h2 class="text-emerald-500 font-bold mb-4 uppercase">Admin Access Required</h2>
            <input type="password" id="adminPass" placeholder="Enter Admin Secret">
            <button onclick="checkAuth()" class="cyber-button">Login</button>
        </div>
    </div>

    <div id="adminPanel" class="dashboard-container" style="display:none;">
        <div class="flex justify-between items-center mb-10 border-b border-gray-800 pb-4">
            <h1 class="font-black text-xl tracking-tighter">METU NCC <span style="color:var(--cyber-green)">CYBERSECURITY SOCIETY</span></h1>
            <span class="text-xs font-mono opacity-50">v2.1_SECURE_BUILD</span>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 2fr; gap: 30px;">
            <div class="event-card">
                <label class="text-xs font-bold opacity-50 uppercase">1. Template (PNG)</label>
                <input type="file" id="bgInput">
                
                <label class="text-xs font-bold opacity-50 uppercase">2. Participant Info</label>
                <input id="userName" placeholder="Full Name">
                <input id="eventName" placeholder="Event Name">
                <input id="eventDate" placeholder="Date (e.g., 31 March 2026)">
                <input id="signers" placeholder="Signer Names (comma separated)">
                
                <button onclick="renderCert()" class="cyber-button">Generate & Seal</button>
            </div>

            <div class="event-card text-center">
                <h3 class="text-xs opacity-50 mb-4 uppercase">Live Preview</h3>
                <canvas id="certCanvas" width="1600" height="900"></canvas>
                <button id="dlBtn" onclick="saveImage()" class="cyber-button mt-4" style="display:none; background:#1f6feb; color:white;">Download Certificate</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
