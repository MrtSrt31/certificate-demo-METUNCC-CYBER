<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>METU NCC Cyber | Design Station</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; background-image: radial-gradient(#1f2937 0.8px, transparent 0.8px); background-size: 30px 30px; }
        .sidebar-panel { background: rgba(13, 17, 23, 0.95); border-right: 1px solid #30363d; }
        .control-group { border-bottom: 1px solid #30363d; padding: 15px 0; }
        .cyber-input { background: #0d1117; border: 1px solid #30363d; color: white; border-radius: 4px; font-size: 12px; width: 100%; padding: 8px; }
        canvas { border: 1px solid #10b981; box-shadow: 0 0 40px rgba(0,0,0,1); }
    </style>
</head>
<body class="flex min-h-screen overflow-hidden">

    <div class="w-80 sidebar-panel p-6 flex flex-col h-screen overflow-y-auto">
        <div class="mb-8 border-b border-gray-800 pb-4">
            <h1 class="text-emerald-500 font-black text-sm tracking-widest uppercase">Design Station v3.0</h1>
            <p class="text-[10px] opacity-50 font-mono mt-1">OPERATOR: <span class="text-white">ADMIN DEMO</span></p>
        </div>

        <div class="control-group">
            <label class="text-[10px] font-bold text-gray-500 uppercase mb-2 block">1. Arkaplan Şablonu</label>
            <input type="file" id="bgLoader" class="text-[10px] text-gray-400 cursor-pointer">
        </div>

        <div class="control-group space-y-2">
            <label class="text-[10px] font-bold text-gray-500 uppercase mb-2 block">2. Katman Ekle</label>
            <button onclick="addText('KATILIMCI ADI', 60, true)" class="w-full bg-gray-800 hover:bg-gray-700 text-[10px] py-2 rounded font-bold transition">+ İSİM KATMANI</button>
            <button onclick="addText('Etkinlik Başlığı', 30, false)" class="w-full bg-gray-800 hover:bg-gray-700 text-[10px] py-2 rounded font-bold transition">+ ETKİNLİK KATMANI</button>
            <button onclick="addQR()" class="w-full bg-emerald-900/30 text-emerald-500 border border-emerald-900 text-[10px] py-2 rounded font-bold transition">+ QR KOD MÜHÜRÜ</button>
        </div>

        <div class="control-group" id="editorControls">
            <label class="text-[10px] font-bold text-gray-500 uppercase mb-4 block">3. Canlı Stil Editörü</label>
            <div class="space-y-3">
                <input type="color" id="fontColor" class="h-8 p-0 border-0 bg-transparent cursor-pointer" onchange="updateStyle()">
                <div class="flex gap-2">
                    <input type="number" id="fontSize" placeholder="Boyut" class="cyber-input" oninput="updateStyle()">
                    <select id="fontWeight" class="cyber-input" onchange="updateStyle()">
                        <option value="400">Normal</option>
                        <option value="700">Bold</option>
                        <option value="900">Black</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="mt-auto pt-6 border-t border-gray-800">
            <button onclick="exportPNG()" class="w-full bg-emerald-600 hover:bg-emerald-500 text-black font-black py-4 rounded-lg tracking-widest text-[11px] uppercase shadow-lg shadow-emerald-900/20">
                SERTİFİKAYI MÜHÜRLE & İNDİR
            </button>
        </div>
    </div>

    <div class="flex-1 flex flex-col items-center justify-center bg-black p-8 overflow-hidden">
        <div class="mb-4 flex justify-between w-full max-w-[1000px] items-center">
            <div class="text-[10px] font-mono text-gray-500 uppercase">MNCS // LIVE_EDITOR // SECURE_LINE</div>
            <div class="text-[10px] text-emerald-500 font-bold uppercase tracking-widest">Sürükle-Bırak Aktif</div>
        </div>
        <div id="canvas-container" class="shadow-2xl">
            <canvas id="fCanvas"></canvas>
        </div>
    </div>

    <script>
        // Editör Kurulumu
        const fCanvas = new fabric.Canvas('fCanvas', {
            width: 1600,
            height: 900,
            backgroundColor: '#161b22'
        });

        // 1. Arkaplan Yükleme
        document.getElementById('bgLoader').onchange = function(e) {
            const reader = new FileReader();
            reader.onload = function(f) {
                fabric.Image.fromURL(f.target.result, function(img) {
                    fCanvas.setBackgroundImage(img, fCanvas.renderAll.bind(fCanvas), {
                        scaleX: fCanvas.width / img.width,
                        scaleY: fCanvas.height / img.height
                    });
                });
            };
            reader.readAsDataURL(e.target.files[0]);
        };

        // 2. Metin Ekleme (Sürüklenebilir)
        function addText(str, size, isBold) {
            const text = new fabric.IText(str, {
                left: 800,
                top: 450,
                fontFamily: 'Inter',
                fontSize: size,
                fill: '#ffffff',
                fontWeight: isBold ? '800' : '400',
                originX: 'center',
                originY: 'center',
                textAlign: 'center'
            });
            fCanvas.add(text);
            fCanvas.setActiveObject(text);
        }

        // 3. QR Kod Mühürü (Sürüklenebilir)
        function addQR() {
            const certID = "MNCS-" + Math.floor(Math.random()*90000);
            const qrUrl = window.location.origin + "/index.html?id=" + certID;
            
            const tempCanvas = document.createElement('canvas');
            QRCode.toCanvas(tempCanvas, qrUrl, { width: 150, margin: 1, color: { dark: '#ffffff', light: '#00000000' } }, () => {
                fabric.Image.fromURL(tempCanvas.toDataURL(), function(img) {
                    img.set({ left: 1400, top: 750, originX: 'center', originY: 'center' });
                    fCanvas.add(img);
                    fCanvas.setActiveObject(img);
                });
            });
        }

        // 4. Stil Güncelleme (Canlı)
        function updateStyle() {
            const activeObj = fCanvas.getActiveObject();
            if (activeObj && activeObj.type === 'i-text') {
                activeObj.set({
                    fill: document.getElementById('fontColor').value,
                    fontSize: parseInt(document.getElementById('fontSize').value) || activeObj.fontSize,
                    fontWeight: document.getElementById('fontWeight').value
                });
                fCanvas.renderAll();
            }
        }

        // Seçilen nesneye göre paneli güncelle
        fCanvas.on('selection:created', (e) => updateControlPanel(e.selected[0]));
        fCanvas.on('selection:updated', (e) => updateControlPanel(e.selected[0]));

        function updateControlPanel(obj) {
            if (obj && obj.type === 'i-text') {
                document.getElementById('fontColor').value = obj.fill;
                document.getElementById('fontSize').value = obj.fontSize;
                document.getElementById('fontWeight').value = obj.fontWeight;
            }
        }

        // 5. Kaydetme
        function exportPNG() {
            const dataURL = fCanvas.toDataURL({ format: 'png', quality: 1 });
            const link = document.createElement('a');
            link.download = 'MNCS-Official-Certificate.png';
            link.href = dataURL;
            link.click();
        }

        // Canvas Boyutunu Responsive Yap
        function resizeCanvas() {
            const container = document.getElementById('canvas-container');
            const scale = container.clientWidth / 1600;
            fCanvas.setZoom(scale);
            fCanvas.setWidth(1600 * scale);
            fCanvas.setHeight(900 * scale);
        }
        window.addEventListener('resize', resizeCanvas);
        setTimeout(resizeCanvas, 500);
    </script>
</body>
</html>
