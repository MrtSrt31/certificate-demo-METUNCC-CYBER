<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>METU NCC Cyber | Master Design Station</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root { --cyber-green: #10b981; }
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; background-image: radial-gradient(#1f2937 0.8px, transparent 0.8px); background-size: 30px 30px; }
        .sidebar { background: rgba(13, 17, 23, 0.98); border-right: 1px solid #30363d; height: 100vh; overflow-y: auto; }
        .cyber-input { background: #0d1117; border: 1px solid #30363d; color: white; border-radius: 4px; font-size: 12px; width: 100%; padding: 8px; }
        .cyber-input:focus { border-color: var(--cyber-green); outline: none; }
        .layer-btn { background: #1f2937; color: #9ca3af; font-size: 10px; font-weight: bold; padding: 8px; border-radius: 4px; width: 100%; text-align: left; transition: 0.2s; border: 1px solid transparent; }
        .layer-btn:hover { border-color: var(--cyber-green); color: #fff; }
    </style>
</head>
<body class="flex overflow-hidden">

    <div class="w-80 sidebar p-6 flex flex-col">
        <div class="mb-6 border-b border-gray-800 pb-4">
            <h1 class="text-emerald-500 font-black text-sm tracking-widest uppercase">Master Station v3.5</h1>
            <p class="text-[10px] opacity-50 font-mono mt-1">NODE: <span class="text-white">ADMIN DEMO</span></p>
        </div>

        <div class="space-y-6">
            <div>
                <label class="text-[10px] font-bold text-gray-500 uppercase mb-2 block">1. Arkaplan (PNG)</label>
                <input type="file" id="bgLoader" class="text-[10px] text-gray-400">
            </div>

            <div class="space-y-2">
                <label class="text-[10px] font-bold text-gray-500 uppercase mb-2 block">2. Akıllı Katman Ekle</label>
                <button onclick="addSmartText('KATILIMCI ADI', 80, '800')" class="layer-btn">+ İSİM (ANA)</button>
                <button onclick="addSmartText('Etkinlik Başlığı', 40, '400')" class="layer-btn">+ ETKİNLİK</button>
                <button onclick="addSmartText('31 Mart 2026', 30, '400')" class="layer-btn">+ TARİH</button>
                <button onclick="addSignLayer()" class="layer-btn">+ İMZA ÇİZGİSİ & İSİM</button>
            </div>

            <div class="pt-4 border-t border-gray-800" id="styleEditor">
                <label class="text-[10px] font-bold text-gray-500 uppercase mb-3 block">3. Stil & Renk Ayarı</label>
                <div class="grid grid-cols-2 gap-2">
                    <input type="color" id="fColor" class="w-full h-8 bg-transparent border-0 cursor-pointer" oninput="apply()">
                    <input type="number" id="fSize" class="cyber-input" placeholder="Size" oninput="apply()">
                </div>
            </div>

            <div class="pt-4 border-t border-gray-800">
                <label class="text-[10px] font-bold text-gray-500 uppercase mb-2 block">4. Sistem Mühürü</label>
                <div class="flex gap-2">
                    <input type="text" id="idPrefix" value="MNCS" class="cyber-input" placeholder="Prefix">
                    <button onclick="sealAndQR()" class="bg-emerald-900/40 text-emerald-500 border border-emerald-900/50 text-[10px] py-2 px-4 rounded font-bold hover:bg-emerald-600 hover:text-black transition">+ ID & QR</button>
                </div>
            </div>
        </div>

        <div class="mt-auto pt-6 border-t border-gray-800">
            <button onclick="exportPNG()" class="w-full bg-emerald-600 hover:bg-emerald-500 text-black font-black py-4 rounded-lg tracking-widest text-[11px] uppercase transition-all shadow-lg shadow-emerald-900/20">
                Sertifikayı İndir / Download
            </button>
        </div>
    </div>

    <div class="flex-1 flex flex-col items-center justify-center bg-black p-10 overflow-hidden relative">
        <div class="absolute top-8 left-8 text-[10px] font-mono text-gray-700 uppercase tracking-widest">MNCS // MASTER_BUILD_3.5 // SECURE_LINE</div>
        <div id="canvas-container" class="shadow-2xl">
            <canvas id="fCanvas"></canvas>
        </div>
        <div class="mt-8 text-gray-700 text-[10px] font-mono uppercase tracking-[0.3em]">
            Canlı Mühür Önizleme Modu - <span class="text-emerald-500">Hazır</span>
        </div>
    </div>

    <script>
        const fCanvas = new fabric.Canvas('fCanvas', {
            width: 1600,
            height: 900,
            backgroundColor: '#161b22',
            preserveObjectStacking: true
        });

        // 1. Arkaplan Yükleme
        document.getElementById('bgLoader').onchange = (e) => {
            const reader = new FileReader();
            reader.onload = (f) => {
                fabric.Image.fromURL(f.target.result, (img) => {
                    fCanvas.setBackgroundImage(img, fCanvas.renderAll.bind(fCanvas), {
                        scaleX: 1600 / img.width,
                        scaleY: 900 / img.height
                    });
                });
            };
            reader.readAsDataURL(e.target.files[0]);
        };

        // 2. Akıllı Metin Ekleme
        function addSmartText(str, size, weight) {
            const text = new fabric.IText(str, {
                left: 800, top: 450, fontFamily: 'Inter', fontSize: size,
                fill: '#ffffff', fontWeight: weight, originX: 'center',
                originY: 'center', textAlign: 'center', cursorDelay: 100
            });
            fCanvas.add(text);
            fCanvas.setActiveObject(text);
        }

        // 3. İmza Katmanı (Grup Olarak)
        function addSignLayer() {
            const line = new fabric.Rect({ width: 200, height: 1.5, fill: '#ffffff', left: 400, top: 750, originX: 'center' });
            const name = new fabric.IText('İmzalayan / Signer', { left: 400, top: 780, fontSize: 24, fill: '#ffffff', originX: 'center', fontFamily: 'Inter' });
            const group = new fabric.Group([line, name], { left: 800, top: 800 });
            fCanvas.add(group);
            fCanvas.setActiveObject(group);
        }

        // 4. Mühürle (ID & QR)
        function sealAndQR() {
            const id = document.getElementById('idPrefix').value + "-" + Math.floor(Math.random()*90000);
            const qrUrl = window.location.origin + "/index.html?id=" + id;
            
            const tempCanvas = document.createElement('canvas');
            QRCode.toCanvas(tempCanvas, qrUrl, { width: 140, margin: 2, color: { dark: '#ffffff', light: '#00000000' } }, () => {
                fabric.Image.fromURL(tempCanvas.toDataURL(), (img) => {
                    img.set({ left: 1420, top: 720, originX: 'center', originY: 'center' });
                    const idText = new fabric.IText("ID: " + id, { left: 1560, top: 870, fontSize: 14, fill: '#ffffff', opacity: 0.3, fontFamily: 'JetBrains Mono', originX: 'right' });
                    const group = new fabric.Group([img, idText], { left: 1420, top: 720 });
                    fCanvas.add(group);
                    fCanvas.setActiveObject(group);
                    alert("Sertifika Mühürlendi! ID: " + id);
                });
            });
        }

        // 5. Stil Uygulama
        function apply() {
            const obj = fCanvas.getActiveObject();
            if (obj && obj.type === 'i-text') {
                obj.set({ fill: document.getElementById('fColor').value, fontSize: parseInt(document.getElementById('fSize').value) || obj.fontSize });
                fCanvas.renderAll();
            }
        }

        // Seçilen nesneye göre paneli güncelle
        fCanvas.on('selection:created', (e) => updateUI(e.selected[0]));
        fCanvas.on('selection:updated', (e) => updateUI(e.selected[0]));
        function updateUI(obj) {
            if (obj && obj.type === 'i-text') {
                document.getElementById('fColor').value = obj.fill;
                document.getElementById('fSize').value = obj.fontSize;
            }
        }

        // PNG Kaydetme
        function exportPNG() {
            const dataURL = fCanvas.toDataURL({ format: 'png', quality: 1, multiplier: 1 });
            const link = document.createElement('a');
            link.download = `MNCS_Official_Cert_${Date.now()}.png`;
            link.href = dataURL;
            link.click();
        }

        // Zoom & Resize
        function resize() {
            const scale = document.getElementById('canvas-container').clientWidth / 1600;
            fCanvas.setZoom(scale);
            fCanvas.setWidth(1600 * scale); fCanvas.setHeight(900 * scale);
        }
        window.addEventListener('resize', resize);
        setTimeout(resize, 500);
    </script>
</body>
</html>
