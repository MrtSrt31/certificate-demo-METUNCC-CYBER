<script>
    function create() {
        let name = document.getElementById("name").value;
        let event = document.getElementById("event").value;
        let date = document.getElementById("date").value;

        if(!name || !event || !date) {
            alert("Please fill all fields!");
            return;
        }

        let id = "MC-" + Math.floor(Math.random() * 100000);

        // Bilgileri URL parametresi olarak gönderir
        window.location.href = 
            "certificate.html?name=" + encodeURIComponent(name) + 
            "&event=" + encodeURIComponent(event) + 
            "&date=" + date + 
            "&id=" + id;
    }

    // --- LinkedIn Fonksiyonu ---
    function addToLinkedIn(name, event, id) {
        let url = `https://www.linkedin.com/profile/add?startTask=CERTIFICATION_NAME&name=${encodeURIComponent(event)}&organizationName=METU%20NCC%20Cyber&credentialId=${id}&credentialUrl=${window.location.href}`;
        window.open(url, '_blank');
    }
</script>
